<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGS Bagaj Operasyon - Yönetim Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq656hCaM2FASRqspAZLDCAdJwqDW-wCQ",
            authDomain: "bilinmeyen-3ef78.firebaseapp.com",
            databaseURL: "https://bilinmeyen-3ef78-default-rtdb.firebaseio.com",
            projectId: "bilinmeyen-3ef78",
            storageBucket: "bilinmeyen-3ef78.firebasestorage.app",
            messagingSenderId: "636444939099",
            appId: "1:636444939099:web:0eb0820a8c71a58dfac07e",
            measurementId: "G-HNG00C71HM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.ref = ref;
        window.set = set;
        window.update = update;
        window.onValue = onValue;
    </script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 px-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full">
            <h1 class="text-2xl font-black text-slate-800 text-center mb-6">TGS Bagaj Giriş</h1>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="usernameInput" required placeholder="Kullanıcı Adı" class="w-full p-3 border rounded-lg">
                <input type="password" id="passwordInput" required placeholder="Şifre" class="w-full p-3 border rounded-lg">
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- ANA İÇERİK -->
    <div id="mainContent" class="hidden">
        <nav class="bg-slate-800 text-white p-4 flex justify-between items-center mb-6">
            <h1 class="font-bold">TGS Yönetim</h1>
            <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-xs font-bold">Çıkış</button>
        </nav>

        <div class="max-w-7xl mx-auto px-4 space-y-8">
            <div id="sahaPanel" class="hidden max-w-lg mx-auto bg-white p-6 rounded-lg shadow border-t-4 border-green-500">
                <h2 class="font-bold mb-4">📸 Bagaj Kayıt</h2>
                <form id="baggageForm" onsubmit="handleBaggageSubmit(event)" class="space-y-4">
                    <input type="text" id="barcodeInput" required placeholder="Barkod No" class="w-full p-3 border rounded-lg">
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="w-full">
                    <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">Gönder</button>
                </form>
            </div>

            <div id="memurPanel" class="hidden bg-white p-6 rounded-lg shadow">
                <h2 class="font-bold mb-4">Onay Bekleyenler</h2>
                <div id="pendingList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div id="adminPanel" class="hidden space-y-8">
                <!-- PERSONEL EKLEME FORMU -->
                <div class="bg-white p-6 rounded-lg shadow">
                    <h2 class="font-bold mb-4">➕ Yeni Personel Ekle</h2>
                    <form id="newUserForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="newFullName" placeholder="Ad Soyad" required class="p-2 border rounded">
                        <input type="text" id="newUsername" placeholder="Kullanıcı Adı" required class="p-2 border rounded">
                        <input type="text" id="newPassword" placeholder="Şifre" required class="p-2 border rounded">
                        <select id="newRole" class="p-2 border rounded">
                            <option value="Saha">Saha</option>
                            <option value="Memur">Memur</option>
                            <option value="Admin">Admin</option>
                        </select>
                        <button type="submit" class="col-span-1 md:col-span-4 bg-blue-600 text-white py-2 rounded font-bold">Kaydet</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-lg shadow">
                    <h2 class="font-bold mb-4">👥 Personel Listesi</h2>
                    <table class="w-full text-left">
                        <thead><tr class="border-b"><th>Ad</th><th>Kullanıcı</th><th>Rol</th></tr></thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DİKKAT: let kullanıldı, const değil!
        let staticUsers = [
            { username: "admin", name: "Sistem Yöneticisi", password: "333", role: "Admin" },
            { username: "saha1", name: "Mehmet Saha", password: "111", role: "Saha" },
            { username: "memur1", name: "Ayşe Memur", password: "222", role: "Memur" }
        ];

        let loggedInUser = null;
        let localBaggageStore = [];
        let finalBase64Image = null;

        // --- YENİ PERSONEL EKLEME MANTIĞI ---
        document.getElementById('newUserForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newUser = {
                name: document.getElementById('newFullName').value,
                username: document.getElementById('newUsername').value,
                password: document.getElementById('newPassword').value,
                role: document.getElementById('newRole').value
            };
            staticUsers.push(newUser);
            renderUsers();
            this.reset();
            alert("Personel eklendi!");
        });

        // --- DİĞER FONKSİYONLAR ---
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const uInput = document.getElementById('usernameInput').value.trim().toLowerCase();
            const pInput = document.getElementById('passwordInput').value;
            const foundUser = staticUsers.find(u => u.username === uInput && u.password === pInput);
            if(foundUser) {
                loggedInUser = foundUser;
                initSystem();
            } else {
                alert("Hatalı giriş!");
            }
        });

        function initSystem() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('sahaPanel').style.display = loggedInUser.role === "Saha" ? "block" : "none";
            document.getElementById('memurPanel').style.display = loggedInUser.role === "Memur" ? "block" : "none";
            document.getElementById('adminPanel').style.display = loggedInUser.role === "Admin" ? "block" : "none";
            renderUsers();
            if (window.db) listenLiveBaggageData();
        }

        function renderUsers() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            staticUsers.forEach(u => {
                tbody.innerHTML += `<tr><td class="p-2 border-b">${u.name}</td><td class="p-2 border-b">${u.username}</td><td class="p-2 border-b">${u.role}</td></tr>`;
            });
        }

        function logout() { location.reload(); }
        
        // Firebase dinleme ve diğer tüm fonksiyonlar önceki ile aynı...
        function listenLiveBaggageData() {
            window.onValue(window.ref(window.db, 'baggages'), (snapshot) => {
                const data = snapshot.val();
                localBaggageStore = data ? Object.keys(data).map(k => data[k]) : [];
                // renderLists() fonksiyonu buraya gelecek...
            });
        }
        
        async function handleBaggageSubmit(e) {
            e.preventDefault();
            // ... (önceki kodun aynısı)
        }
    </script>
</body>
</html>
