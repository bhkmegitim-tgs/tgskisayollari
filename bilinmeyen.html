<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGS Bagaj Operasyon - Tek Dosya Bulut Sistemi</title>
    <!-- Tailwind CSS (Görsel Tasarım İçin) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- SheetJS (Excel Çıktısı Alabilmek İçin) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* Arayüz bileşenlerinin Tailwind v4 üzerinde kaybolmasını ya da taşmasını engelleyen kurallar */
        .tgs-table {
            width: 100% !important;
            border-collapse: collapse !important;
            display: table !important;
        }
        .tgs-table th, .tgs-table td {
            padding: 14px 16px !important;
            border-bottom: 1px solid #e2e8f0 !important;
            text-align: left !important;
            vertical-align: middle !important;
        }
        .admin-block {
            display: block !important;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 px-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full">
            <div class="text-center mb-6">
                <span class="text-5xl block mb-2">🧳</span>
                <h1 class="text-2xl font-black text-slate-800">TGS Bagaj Operasyon</h1>
                <p class="text-sm text-gray-500">Tek Dosya Bulut Sistemi</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Kullanıcı Adı</label>
                    <input type="text" id="usernameInput" required placeholder="Örn: tgs1234" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Şifre</label>
                    <input type="password" id="passwordInput" required placeholder="••••••" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition cursor-pointer">Giriş Yap</button>
            </form>
            <p id="loginError" class="text-red-500 text-xs font-semibold mt-3 text-center hidden">❌ Hatalı giriş!</p>
        </div>
    </div>

    <!-- SİSTEM ANA İÇERİĞİ -->
    <div id="mainContent" class="hidden">
        <nav class="bg-slate-800 text-white p-4 shadow-md flex justify-between items-center mb-6">
            <div>
                <h1 class="text-lg font-bold">🧳 TGS Bulut Bagaj Yönetimi</h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <span id="activeUserBadge" class="text-xs font-medium text-gray-300">-</span>
                    <span id="roleBadge" class="text-[10px] bg-blue-500 text-white font-black px-2 py-0.5 rounded-full uppercase">Rol</span>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded text-xs font-bold cursor-pointer">Çıkış ↩</button>
        </nav>

        <div class="max-w-7xl mx-auto px-4 space-y-8">
            
            <!-- SAHA PANELİ -->
            <div id="sahaPanel" class="hidden max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                <h2 class="text-lg font-bold text-gray-800 mb-4">📸 Saha Bagaj Kayıt</h2>
                <form id="baggageForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Barkod No</label>
                        <input type="text" id="barcodeInput" required placeholder="Örn: TK95123" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fotoğraf Çek</label>
                        <input type="file" id="cameraInput" accept="image/*" capture="environment" required class="w-full text-sm cursor-pointer">
                    </div>
                    <div id="previewContainer" class="hidden border rounded p-2 bg-gray-50">
                        <img id="imagePreview" src="" class="w-full h-40 object-cover rounded">
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white p-2.5 rounded font-medium hover:bg-green-700 cursor-pointer">Sisteme Gönder</button>
                </form>
            </div>

            <!-- MEMUR PANELİ -->
            <div id="memurPanel" class="hidden bg-white p-6 rounded-lg shadow-md border-t-4 border-amber-500">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex justify-between">
                    <span>⏳ Onay Bekleyen Bagajlar</span>
                    <span id="pendingCount" class="bg-amber-100 text-amber-800 text-xs font-bold px-2.5 py-1 rounded-full">0</span>
                </h2>
                <div id="pendingList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- ADMIN PANELİ -->
            <div id="adminPanel" class="hidden space-y-8 admin-block">
                
                <!-- PERSONEL TANIMLAMA VE YÖNETİM ALANI -->
                <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 mb-6">
                    <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">👥 Personel ve Rol Tanımlama</h2>
                    <div class="overflow-x-auto border border-gray-200 rounded-lg bg-white">
                        <table class="tgs-table min-w-full text-sm text-gray-600">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-50 font-bold border-b border-gray-200">
                                <tr>
                                    <th>Personel Adı</th>
                                    <th>Kullanıcı Adı</th>
                                    <th>Mevcut Rolü</th>
                                    <th>Giriş Şifresi</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <!-- Dinamik kullanıcı listesi buraya basılacak -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- SİSTEM LOG RAPORU ALANI -->
                <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">📊 Sistem Log Raporu</h2>
                        <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-lg text-sm cursor-pointer shadow-sm">Excel İndir (.xlsx)</button>
                    </div>
                    <div class="overflow-x-auto border border-gray-200 rounded-lg bg-white">
                        <table class="tgs-table min-w-full text-sm text-gray-600">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-50 font-bold border-b border-gray-200">
                                <tr>
                                    <th>Barkod</th>
                                    <th>Görsel</th>
                                    <th>Durum</th>
                                    <th>İşlem Yapan</th>
                                    <th>Zaman</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody">
                                <!-- Dinamik bagaj hareketleri buraya eklenecek -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Vercel panelinden aldığımız güncel token şifreniz
        const VERCEL_BLOB_TOKEN = "vercel_blob_rw_JxN4iMyJK80kKLEO_CH3vun95ecpQGSWWE3yjZjqGeZWrfg";

        // Kullanıcı Giriş Bilgileri ve Tanımlamaları
        const users = [
            { username: "admin", name: "Sistem Yöneticisi", password: "333", role: "Admin" },
            { username: "saha1", name: "Mehmet Saha", password: "111", role: "Saha" },
            { username: "memur1", name: "Ayşe Memur", password: "222", role: "Memur" }
        ];

        let selectedFile = null;
        let loggedInUser = null;

        // Bagaj verilerini senkronize etmek için localStorage kullanıyoruz
        let localBaggageStore = JSON.parse(localStorage.getItem('tgs_blob_baggage') || '[]');

        // Giriş Kontrolü
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const uInput = document.getElementById('usernameInput').value.trim();
            const pInput = document.getElementById('passwordInput').value.trim();
            const foundUser = users.find(u => u.username === uInput && u.password === pInput);

            if (foundUser) {
                loggedInUser = foundUser;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('activeUserBadge').innerText = "Kullanıcı: " + loggedInUser.name;
                document.getElementById('roleBadge').innerText = loggedInUser.role;
                
                setupPanelVisibility();
                renderLists();
                renderUsers(); // Giriş anında kullanıcı tablosunu çiz
                
                // Saha dışındaki paneller için verileri her 3 saniyede bir otomatik yenile
                if(loggedInUser.role !== "Saha") {
                    setInterval(() => {
                        localBaggageStore = JSON.parse(localStorage.getItem('tgs_blob_baggage') || '[]');
                        renderLists();
                    }, 3000);
                }
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        function setupPanelVisibility() {
            // Panellerin görünürlüğünü rol bazlı olarak ayarla
            document.getElementById('sahaPanel').style.display = loggedInUser.role === "Saha" ? "block" : "none";
            document.getElementById('memurPanel').style.display = loggedInUser.role === "Memur" ? "block" : "none";
            document.getElementById('adminPanel').style.display = loggedInUser.role === "Admin" ? "block" : "none";
        }

        function logout() { location.reload(); }

        // Admin Paneli İçin Personel Listesini Çizen Fonksiyon
        function renderUsers() {
            const userTableBody = document.getElementById('userTableBody');
            if (!userTableBody) return;
            
            userTableBody.innerHTML = '';
            users.forEach(u => {
                let roleColor = "bg-gray-100 text-gray-800";
                if(u.role === "Admin") roleColor = "bg-purple-100 text-purple-800 border border-purple-200";
                if(u.role === "Saha") roleColor = "bg-green-100 text-green-800 border border-green-200";
                if(u.role === "Memur") roleColor = "bg-amber-100 text-amber-800 border border-amber-200";

                userTableBody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="font-bold text-gray-900">${u.name}</td>
                        <td class="font-mono text-gray-600">${u.username}</td>
                        <td><span class="px-2.5 py-0.5 rounded-full text-xs font-black uppercase inline-block ${roleColor}">${u.role}</span></td>
                        <td><span class="text-xs font-mono text-gray-700 bg-gray-100 rounded px-2 py-1 select-all border border-gray-200">${u.password}</span></td>
                    </tr>`;
            });
        }

        // Fotoğraf Seçildiğinde Önizleme Göster
        document.getElementById('cameraInput').addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('imagePreview').src = event.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        // Doğrudan HTML İçinden Vercel Blob API'ye Resim Yükleme
        document.getElementById('baggageForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if(!selectedFile) return alert("Lütfen bir fotoğraf çekin veya seçin!");

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Buluta Gönderiliyor...";

            const barcode = document.getElementById('barcodeInput').value.trim();
            const filename = `tgs-${barcode}-${Date.now()}.jpg`;

            try {
                const response = await fetch(`https://blob.vercel-storage.com/${filename}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${VERCEL_BLOB_TOKEN}`,
                        'x-xss-protection': '1; mode=block'
                    },
                    body: selectedFile
                });

                if(!response.ok) throw new Error("Yükleme sırasında Vercel sunucusu hata verdi.");
                
                const blobData = await response.json();
                const bulutResimLinki = blobData.url;

                const newBaggage = {
                    id: 'BGG-' + Math.floor(100000 + Math.random() * 900000),
                    barcode: barcode,
                    imageUrl: bulutResimLinki,
                    status: 'Bekliyor',
                    processedBy: null,
                    processedAt: null
                };

                localBaggageStore.push(newBaggage);
                localStorage.setItem('tgs_blob_baggage', JSON.stringify(localBaggageStore));

                alert("Bagaj fotoğrafı başarıyla buluta yüklendi ve sisteme kaydedildi!");
                this.reset();
                document.getElementById('previewContainer').classList.add('hidden');
                selectedFile = null;

            } catch (err) {
                alert("Hata Oluştu: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Sisteme Gönder";
            }
        });

        // Durum Güncelleme (Onaylama / Kayıp Eşya)
        function updateStatus(id, newStatus) {
            localBaggageStore = localBaggageStore.map(item => {
                if (item.id === id) {
                    return { ...item, status: newStatus, processedBy: loggedInUser.name, processedAt: new Date().toLocaleString('tr-TR') };
                }
                return item;
            });
            localStorage.setItem('tgs_blob_baggage', JSON.stringify(localBaggageStore));
            renderLists();
        }

        // Listeleri ve Rapor Tablosunu Arayüze Ekleme
        function renderLists() {
            const pendingList = document.getElementById('pendingList');
            const logTableBody = document.getElementById('logTableBody');
            
            const pendingItems = localBaggageStore.filter(item => item.status === 'Bekliyor');
            const processedItems = localBaggageStore.filter(item => item.status !== 'Bekliyor');

            if(document.getElementById('pendingCount')) {
                document.getElementById('pendingCount').innerText = pendingItems.length;
            }

            if(pendingList) {
                pendingList.innerHTML = '';
                pendingItems.forEach(item => {
                    pendingList.innerHTML += `
                        <div class="border rounded-xl p-4 bg-white shadow-sm border-gray-200">
                            <img src="${item.imageUrl}" class="w-full h-44 object-cover rounded-lg mb-3">
                            <div class="flex justify-between items-center font-bold mb-4 text-gray-800">
                                <span>Barkod: ${item.barcode}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="updateStatus('${item.id}', 'İşlem OK')" class="bg-blue-600 text-white py-2 rounded text-xs font-bold cursor-pointer hover:bg-blue-700">✓ İşlem OK</button>
                                <button onclick="updateStatus('${item.id}', 'Kayıp Eşya')" class="bg-red-600 text-white py-2 rounded text-xs font-bold cursor-pointer hover:bg-red-700">📦 Kayıp Eşya</button>
                            </div>
                        </div>`;
                });
            }

            if(logTableBody) {
                logTableBody.innerHTML = '';
                if(processedItems.length === 0) {
                    logTableBody.innerHTML = `<tr><td colspan="5" class="text-center text-gray-400 py-8">Henüz işlem görmüş bir bagaj kaydı bulunmuyor.</td></tr>`;
                } else {
                    processedItems.forEach(item => {
                        const statusColor = item.status === 'İşlem OK' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-rose-100 text-rose-800 border border-rose-200';
                        logTableBody.innerHTML += `
                            <tr class="hover:bg-gray-50 transition">
                                <td class="font-bold text-gray-950">${item.barcode}</td>
                                <td><a href="${item.imageUrl}" target="_blank"><img src="${item.imageUrl}" class="w-12 h-12 object-cover rounded shadow-sm border border-gray-300"></a></td>
                                <td><span class="px-2.5 py-1 rounded-full text-xs font-black inline-block ${statusColor}">${item.status}</span></td>
                                <td class="text-gray-700 font-medium">${item.processedBy || '-'}</td>
                                <td class="text-xs text-gray-500 font-mono">${item.processedAt || '-'}</td>
                            </tr>`;
                    });
                }
            }
        }

        // Excel Çıktısı Alma Fonksiyonu
        function exportToExcel() {
            if (localBaggageStore.length === 0) return alert("Raporlanacak herhangi bir veri bulunamadı!");
            
            const cleanData = localBaggageStore.map(item => ({
                "Bagaj ID": item.id,
                "Barkod No": item.barcode,
                "Fotoğraf Linki (Bulut)": item.imageUrl,
                "Durum": item.status,
                "İşlem Yapan": item.processedBy || "Bekliyor",
                "İşlem Zamanı": item.processedAt || "Bekliyor"
            }));

            const worksheet = XLSX.utils.json_to_sheet(cleanData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "TGS Bagaj Raporu");
            XLSX.writeFile(workbook, "TGS_Bulut_Bagaj_Raporu.xlsx");
        }
    </script>
</body>
</html>
