<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TGS Bagaj Operasyon</title>
    <!-- Tailwind ve Firebase kütüphaneleri burada yer almalı -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase yapılandırmanız
        const firebaseConfig = {
            apiKey: "AIzaSyCq656hCaM2FASRqspAZLDCAdJwqDW-wCQ",
            authDomain: "bilinmeyen-3ef78.firebaseapp.com",
            databaseURL: "https://bilinmeyen-3ef78-default-rtdb.firebaseio.com",
            projectId: "bilinmeyen-3ef78",
            storageBucket: "bilinmeyen-3ef78.firebasestorage.app",
            messagingSenderId: "636444939099",
            appId: "1:636444939099:web:0eb0820a8c71a58dfac07e"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref;
        window.set = set;
        window.update = update;
        window.onValue = onValue;
    </script>
</head>
<body>

    <!-- BURAYA MEVCUT PANEL YAPINIZ GELECEK -->
    <!-- Admin panel div'inizin içine şu butonu ekleyin: -->
    <div id="adminPanel">
        <button onclick="adminDeleteAll()" class="bg-red-600 text-white p-2 rounded">Tüm Verileri Sil</button>
    </div>

    <script>
        // SİSTEMİNİZİN TÜM FONKSİYONLARI BURADA DURMALI 
        // (Giriş yapma, listeleme vb.)

        // SİLME FONKSİYONU (En alta ekleyin)
        function adminDeleteAll() {
            if (confirm("Tüm veriler silinecek, emin misiniz?")) {
                window.set(window.ref(window.db, 'baggages'), null)
                    .then(() => alert("Başarıyla silindi."))
                    .catch((err) => alert("Hata: " + err));
            }
        }
    </script>
</body>
</html>
