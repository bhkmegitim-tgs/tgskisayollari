<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TGS Yönetim Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq656hCaM2FASRqspAZLDCAdJwqDW-wCQ",
            databaseURL: "https://bilinmeyen-3ef78-default-rtdb.firebaseio.com",
            projectId: "bilinmeyen-3ef78"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref;
        window.set = set;
    </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- GİRİŞ FORMU -->
    <div id="loginCard" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">TGS Giriş</h2>
        <input type="text" id="u" placeholder="Kullanıcı Adı" class="w-full p-3 mb-3 border rounded-lg">
        <input type="password" id="p" placeholder="Şifre" class="w-full p-3 mb-4 border rounded-lg">
        <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Giriş Yap</button>
    </div>

    <!-- ADMİN PANELİ -->
    <div id="adminPanel" class="hidden bg-white p-8 rounded-xl shadow-lg w-full max-w-sm text-center">
        <h2 class="text-xl font-bold mb-6">Admin Paneli</h2>
        <button onclick="clearDatabase()" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold mb-3 hover:bg-red-700 transition">Tüm Verileri Sil (Baggages) 🗑️</button>
        <button onclick="logout()" class="w-full bg-gray-500 text-white py-3 rounded-lg font-bold">Çıkış Yap</button>
    </div>

    <script>
        // Giriş Kontrolü
        function checkLogin() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            
            if (u === "admin" && p === "333") {
                sessionStorage.setItem('isLogged', 'true');
                showAdmin();
            } else {
                alert("Hatalı kullanıcı adı veya şifre!");
            }
        }

        // Veri Silme Fonksiyonu
        async function clearDatabase() {
            if(confirm("DİKKAT: Tüm kayıtlar kalıcı olarak silinecek! Onaylıyor musunuz?")) {
                try {
                    await window.set(window.ref(window.db, 'baggages'), null);
                    alert("Veritabanı başarıyla temizlendi.");
                } catch(e) {
                    alert("Hata oluştu, tekrar deneyin.");
                }
            }
        }

        function showAdmin() {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        function logout() {
            sessionStorage.removeItem('isLogged');
            location.reload();
        }

        // Sayfa açıldığında oturumu kontrol et
        if(sessionStorage.getItem('isLogged') === 'true') {
            showAdmin();
        }
    </script>
</body>
</html>
