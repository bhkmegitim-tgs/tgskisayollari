<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGS Bagaj Operasyon</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- SheetJS (Excel İçin) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <!-- FİREBASE MODÜLLERİ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq656hCaM2FASRqspAZLDCAdJwqDW-wCQ",
            authDomain: "bilinmeyen-3ef78.firebaseapp.com",
            databaseURL: "https://bilinmeyen-3ef78-default-rtdb.firebaseio.com",
            projectId: "bilinmeyen-3ef78",
            storageBucket: "bilinmeyen-3ef78.firebasestorage.app",
            messagingSenderId: "636444939099",
            appId: "1:636444939099:web:0eb0820a8c71a58dfac07e",
            measurementId: "G-HNG00C71HM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.ref = ref;
        window.set = set;
        window.update = update;
        window.onValue = onValue;
        
        window.initSystemFlag = true;
        listenLiveBaggageData();
        listenLiveUsers();
    </script>

    <style>
        .tgs-table { width: 100% !important; border-collapse: collapse !important; display: table !important; }
        .tgs-table th, .tgs-table td { padding: 12px 14px !important; border-bottom: 1px solid #e2e8f0 !important; text-align: left !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 px-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full">
            <div class="text-center mb-6">
                <span class="text-5xl block mb-2">🧳</span>
                <h1 class="text-2xl font-black text-slate-800">TGS Bagaj Operasyon</h1>
            </div>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="usernameInput" required placeholder="Kullanıcı Adı" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none">
                <input type="password" id="passwordInput" required placeholder="Şifre" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none">
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition cursor-pointer">Giriş Yap</button>
            </form>
            <p id="loginError" class="text-red-500 text-xs font-semibold mt-3 text-center hidden">❌ Hatalı kullanıcı adı veya şifre!</p>
        </div>
    </div>

    <!-- ANA İÇERİK -->
    <div id="mainContent" class="hidden">
        <nav class="bg-slate-800 text-white p-4 shadow-md flex justify-between items-center mb-6">
            <div>
                <h1 class="text-lg font-bold">🧳 TGS Bagaj Yönetimi</h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <span id="activeUserBadge" class="text-xs font-medium text-gray-300">-</span>
                    <span id="roleBadge" class="text-[10px] bg-blue-500 text-white font-black px-2 py-0.5 rounded-full uppercase">Rol</span>
                    <span id="syncStatus" class="text-[10px] bg-green-600 text-white font-medium px-2 py-0.5 rounded-full">⚡ Canlı Bulut</span>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded text-xs font-bold cursor-pointer">Çıkış ↩</button>
        </nav>

        <div class="max-w-7xl mx-auto px-4 space-y-8">
            
            <!-- SAHA PANELİ -->
            <div id="sahaPanel" class="hidden max-w-lg mx-auto space-y-6">
                <!-- ... (Saha içeriğiniz aynı kalacak) ... -->
            </div>

            <!-- MEMUR PANELİ -->
            <div id="memurPanel" class="hidden bg-white p-6 rounded-lg shadow-md border-t-4 border-amber-500">
                <!-- ... (Memur içeriğiniz aynı kalacak) ... -->
            </div>

            <!-- ADMIN PANELİ -->
            <div id="adminPanel" class="hidden space-y-8">
                <!-- YENİ BUTON BURAYA EKLENDİ -->
                <div class="bg-red-50 p-6 rounded-lg shadow-md border-2 border-red-200">
                    <h2 class="text-lg font-bold text-red-700 mb-2">⚠️ Admin Tehlikeli Bölge</h2>
                    <button onclick="clearAllData()" class="bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700">TÜM VERİLERİ SİL (Baggages) 🗑️</button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- ... (Personel Ekleme ve Diğer kısımlar aynı kalacak) ... -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ... (Diğer tüm scriptler aynı kalacak) ...

        // YENİ EKLEDİĞİMİZ SİLME FONKSİYONU
        async function clearAllData() {
            if(confirm("DİKKAT: Tüm bagaj verileri kalıcı olarak silinecek! Onaylıyor musunuz?")) {
                try {
                    await window.set(window.ref(window.db, 'baggages'), null);
                    alert("Veritabanı başarıyla temizlendi.");
                } catch(e) {
                    alert("Hata: Silme işlemi başarısız.");
                }
            }
        }

        // ... (Diğer fonksiyonlarınız aşağıda devam eder) ...
    </script>
</body>
</html>
