<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TGS Bagaj Operasyon</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq656hCaM2FASRqspAZLDCAdJwqDW-wCQ",
            databaseURL: "https://bilinmeyen-3ef78-default-rtdb.firebaseio.com",
            projectId: "bilinmeyen-3ef78"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref; window.set = set; window.onValue = onValue;
    </script>
</head>
<body class="bg-gray-100 p-4">

    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-10">
        <h1 class="text-2xl font-bold mb-6 text-center">TGS Giriş</h1>
        <input type="text" id="user" placeholder="Kullanıcı Adı" class="w-full p-3 mb-3 border rounded">
        <input type="password" id="pass" placeholder="Şifre" class="w-full p-3 mb-4 border rounded">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded font-bold">Giriş Yap</button>
    </div>

    <!-- ANA PANEL -->
    <div id="appPanel" class="hidden max-w-4xl mx-auto space-y-6">
        <nav class="bg-slate-800 text-white p-4 rounded flex justify-between items-center">
            <div>
                <span id="welcomeMsg" class="font-bold"></span>
                <span id="roleBadge" class="ml-2 text-xs bg-blue-500 px-2 py-1 rounded uppercase"></span>
            </div>
            <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-sm font-bold">Çıkış</button>
        </nav>

        <!-- ADMIN'E ÖZEL SİLME BUTONU -->
        <div id="adminControls" class="hidden bg-white p-6 rounded shadow border-l-4 border-red-600">
            <h2 class="font-bold text-lg mb-4">Admin Kontrol Paneli</h2>
            <button onclick="clearAllData()" class="bg-red-600 text-white px-6 py-2 rounded font-bold hover:bg-red-700">Tüm Verileri Sil (Baggages) 🗑️</button>
        </div>

        <!-- DİĞER PERSONELLER İÇİN BİLGİ -->
        <div id="userWelcome" class="bg-white p-6 rounded shadow text-center">
            Sisteme giriş yaptınız. Operasyonlar aktif.
        </div>
    </div>

    <script>
        // Kullanıcı tanımları (Saha, Memur ve Admin)
        const users = [
            { username: "admin", pass: "333", role: "Admin" },
            { username: "saha", pass: "123", role: "Saha" },
            { username: "memur", pass: "123", role: "Memur" }
        ];

        function login() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            const found = users.find(x => x.username === u && x.pass === p);

            if (found) {
                sessionStorage.setItem('tgs_user', JSON.stringify(found));
                initUI();
            } else {
                alert("Hatalı kullanıcı adı veya şifre!");
            }
        }

        function initUI() {
            const user = JSON.parse(sessionStorage.getItem('tgs_user'));
            if (!user) return;

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appPanel').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = "Hoş geldin, " + user.username;
            document.getElementById('roleBadge').innerText = user.role;

            // Eğer Admin ise silme panelini göster
            if (user.role === "Admin") {
                document.getElementById('adminControls').classList.remove('hidden');
            }
        }

        async function clearAllData() {
            if(confirm("DİKKAT: Tüm bagaj verileri kalıcı olarak silinecek! Onaylıyor musunuz?")) {
                await window.set(window.ref(window.db, 'baggages'), null);
                alert("Tüm veritabanı sıfırlandı.");
            }
        }

        function logout() {
            sessionStorage.removeItem('tgs_user');
            location.reload();
        }

        if(sessionStorage.getItem('tgs_user')) initUI();
    </script>
</body>
</html>
