<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BHKM - Kural İhlal Takip Sistemi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #e67e22; /* TGS Turuncu Tonu */
            --dark-color: #2c3e50;
            --light-bg: #f5f7fa;
            --success-color: #27ae60;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        html, body {
            background-color: var(--light-bg);
            color: var(--dark-color);
            padding: 10px;
            overflow-x: hidden; /* Yatay kaymayı tamamen engeller */
            width: 100%;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        @media (min-width: 600px) {
            body { padding: 20px; }
            .container { padding: 30px; }
        }
        .header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 20px;
            color: var(--dark-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        @media (min-width: 600px) {
            .header h1 { font-size: 24px; }
        }
        .header p {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr; /* Mobilde tek sütun */
            gap: 15px;
            margin-bottom: 25px;
        }
        @media (min-width: 600px) {
            .form-grid { grid-template-columns: 1fr 1fr; } /* Masaüstünde çift sütun */
        }
        .form-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #34495e;
        }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%; /* Dışarı taşmayı önler */
            max-width: 100%;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
        }
        input[readonly] {
            background-color: #f0f3f4;
            color: #7f8c8d;
            cursor: not-allowed;
        }
        .btn-group {
            display: flex;
            flex-direction: column; /* Mobilde butonlar alt alta */
            gap: 10px;
            margin-top: 20px;
        }
        @media (min-width: 600px) {
            .btn-group {
                flex-direction: row; /* Masaüstünde yan yana */
                gap: 15px;
            }
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .btn-submit {
            background-color: var(--success-color);
            color: white;
        }
        .btn-excel {
            background-color: var(--dark-color);
            color: white;
        }
        .status-msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
            word-break: break-word;
        }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
