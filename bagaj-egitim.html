<form id="trainingForm">
    <input type="text" name="p_name" placeholder="Ad Soyad" required>
    <input type="text" name="p_sicil" placeholder="Sicil No">
    <input type="text" name="p_istasyon" placeholder="İstasyon">
    <input type="text" name="p_reason" placeholder="Eğitim Nedeni">

    <input type="text" name="s_1_u1" placeholder="Soru 1 - 1. Uyg">
    <input type="text" name="s_1_u2" placeholder="Soru 1 - 2. Uyg">
    <button type="submit">Formu Supabase'e Kaydet</button>
</form>

<script>
    document.getElementById('trainingForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const formData = new FormData(document.getElementById('trainingForm'));
        const data = {};
        
        // Formdaki tüm verileri otomatik topluyoruz
        formData.forEach((value, key) => {
            data[key] = value;
        });
        
        // Supabase bağlantısı
        const SUPABASE_URL = "https://haqoaxlvhfvwcbjowaxk.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhcW9heGx2aGZ2d2Nibm93YXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTcyOTI4MDAsImV4cCI6MjAzMjg2ODgwMH0.0b0B_u4XWzX7hX9P_vXzWzX7hX9P_vXzWzX7hX9P_vX"; 

        fetch(`${SUPABASE_URL}/rest/v1/bagaj_egitim`, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=minimal"
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (response.ok) {
                alert("Başarıyla kaydedildi!");
            } else {
                return response.json().then(err => {
                    alert("Kayıt hatası: " + err.message);
                    console.error(err);
                });
            }
        });
    });
</script>
