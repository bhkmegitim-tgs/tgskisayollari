<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TGS - Eğitim Formu</title>
</head>
<body>

<form id="trainingForm">
    <input type="text" name="ad_soyad" placeholder="Ad Soyad" required>
    <input type="text" name="sicil_no" placeholder="Sicil No">
    <input type="text" name="egitim_konusu" placeholder="Eğitim Konusu">
    <button type="submit">Kaydet</button>
</form>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // Senin Firebase ayarların
    const firebaseConfig = {
        apiKey: "AIzaSyBy_YvEso3gLAfsRx5KDxyJrJsM-LhUhI0",
        authDomain: "bhkmform.firebaseapp.com",
        projectId: "bhkmform",
        storageBucket: "bhkmform.firebasestorage.app",
        messagingSenderId: "184259040544",
        appId: "1:184259040544:web:f8fdc7b1c723351b6cb345"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    document.getElementById('trainingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target).entries());

        try {
            await addDoc(collection(db, "bagaj_egitimleri"), data);
            alert("Başarıyla Firebase'e kaydedildi!");
            e.target.reset();
        } catch (err) {
            alert("Hata oluştu, konsola bak: " + err.message);
            console.error(err);
        }
    });
</script>
</body>
</html>
