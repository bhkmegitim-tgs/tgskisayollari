<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TGS - Eğitim Formu</title>
    </head>
<body>

    <form id="trainingForm">
        <input type="text" name="p_name" placeholder="Ad Soyad" required>
        <div id="txtScore" style="display:none;">100%</div>
        <div id="txtStatus" style="display:none;">BAŞARILI</div>
        
        <button type="submit">Formu Gönder</button>
    </form>

    <script>
        document.getElementById('trainingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const formData = new FormData(document.getElementById('trainingForm'));
            const data = {};
            
            formData.forEach((value, key) => {
                data[key] = value;
            });
            
            data["basari_yuzdesi"] = document.getElementById('txtScore').innerText;
            data["sonuc"] = document.getElementById('txtStatus').innerText;

            const SUPABASE_URL = "https://haqoaxlvhfvwcbjowaxk.supabase.co"; 
            const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhcW9heGx2aGZ2d2Nibm93YXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTcyOTI4MDAsImV4cCI6MjAzMjg2ODgwMH0.0b0B_u4XWzX7hX9P_vXzWzX7hX9P_vXzWzX7hX9P_vX"; 

            fetch(`${SUPABASE_URL}/rest/v1/bagaj_egitim`, {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    alert("Başarıyla kaydedildi!");
                    document.getElementById('trainingForm').reset();
                } else {
                    return response.json().then(err => {
                        console.error("Hata Detayı:", err);
                        alert("Kayıt başarısız! Hata: " + err.message + ". Konsolu (F12) kontrol et.");
                    });
                }
            })
            .catch(err => alert("Bağlantı hatası: " + err.message));
        });
    </script>
</body>
</html>
