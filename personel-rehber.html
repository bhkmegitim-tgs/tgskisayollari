<!-- HIZLI İLETİŞİM VE ARAMA MODÜLÜ BAŞLANGICI -->
<div style="max-width: 600px; margin: 20px auto; padding: 20px; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: sans-serif;">
    <h3 style="margin-top: 0; color: #333; text-align: center; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px;">
        👤 Personel Hızlı İletişim Paneli
    </h3>
    
    <!-- Arama Girdisi -->
    <div style="margin-bottom: 15px;">
        <label for="personelAra" style="display: block; margin-bottom: 5px; font-weight: bold; color: #555;">Personel İsim / Soyisim:</label>
        <input type="text" id="personelAra" list="personelDatalist" placeholder="İsim yazmaya başlayın..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px;">
        <datalist id="personelDatalist">
            <!-- Personel isimleri dinamik olarak buraya dolacak -->
        </datalist>
    </div>

    <!-- Sonuç ve İşlem Butonları (Varsayılan olarak gizli) -->
    <div id="iletisimAlan" style="display: none; background: #f9f9f9; padding: 15px; border-radius: 6px; border-left: 4px solid #007bff;">
        <p style="margin: 0 0 10px 0; font-size: 16px; color: #333;">
            Seçilen Personel: <strong id="secilenAd">-</strong>
        </p>
        <p style="margin: 0 0 15px 0; font-size: 14px; color: #666;">
            Telefon: <span id="secilenTel">-</span>
        </p>
        
        <div style="display: flex; gap: 10px;">
            <!-- WhatsApp Butonu -->
            <a id="wsLink" href="#" target="_blank" style="flex: 1; text-align: center; background: #25D366; color: white; padding: 12px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block;">
                💬 WhatsApp'tan Yaz
            </a>
            <!-- Doğrudan Arama Butonu -->
            <a id="araLink" href="#" style="flex: 1; text-align: center; background: #007bff; color: white; padding: 12px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block;">
                📞 Telefonla Ara
            </a>
        </div>
    </div>
</div>

<script>
// 1. PERSONEL LİSTESİ (Buraya isimleri ve numaraları başında 0 olmadan ekleyebilirsin)
const personelListesi = [
    { isim: "Ahmet Yılmaz", tel: "5321234567" },
    { isim: "Mehmet Demir", tel: "5429876543" },
    { isim: "Ayşe Kaya", tel: "5551112233" },
    { isim: "Mustafa Öztürk", tel: "5054445566" }
    // İstediğin kadar personeli bu formatta aşağıya doğru ekleyebilirsin
];

// Sayfa yüklendiğinde datalist'i (açılır listeyi) doldur
const datalist = document.getElementById('personelDatalist');
personelListesi.forEach(personel => {
    let option = document.createElement('option');
    option.value = personel.isim;
    datalist.appendChild(option);
});

// Arama alanında değişiklik olduğunda çalışacak fonksiyon
document.getElementById('personelAra').addEventListener('input', function() {
    const girilenIsim = this.value;
    // Listede tam eşleşme ara
    const bulunanPersonel = personelListesi.find(p => p.isim.toLowerCase() === girilenIsim.toLowerCase());
    
    const iletisimAlan = document.getElementById('iletisimAlan');
    
    if (bulunanPersonel) {
        // Bilgileri doldur
        document.getElementById('secilenAd').innerText = bulunanPersonel.isim;
        document.getElementById('secilenTel').innerText = bulunanPersonel.tel;
        
        // Linkleri oluştur (Türkiye kodu 90 otomatik ekleniyor)
        document.getElementById('wsLink').href = "https://wa.me/90" + bulunanPersonel.tel;
        document.getElementById('araLink').href = "tel:+90" + bulunanPersonel.tel;
        
        // Alanı görünür yap
        iletisimAlan.style.display = "block";
    } else {
        // Eşleşme yoksa alanı gizle
        iletisimAlan.style.display = "none";
    }
});
</script>
<!-- HIZLI İLETİŞİM VE ARAMA MODÜLÜ BİTİŞİ -->
